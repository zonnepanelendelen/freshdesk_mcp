# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - freshdeskApiKey
      - freshdeskDomain
    properties:
      freshdeskApiKey:
        type: string
        description: Freshdesk API Key
      freshdeskDomain:
        type: string
        description: Freshdesk domain (e.g., yourcompany.freshdesk.com)
      readOnly:
        type: boolean
        default: false
        description: When true, only read tools are exposed; all create/update/delete tools are disabled.
      disableDestructive:
        type: boolean
        default: false
        description: When true, destructive delete tools (delete_ticket, delete_ticket_summary) are disabled. Creates and updates remain available.
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({
      command: 'freshdesk-mcp',
      args: [],
      env: {
        FRESHDESK_API_KEY: config.freshdeskApiKey,
        FRESHDESK_DOMAIN: config.freshdeskDomain,
        FRESHDESK_READ_ONLY: String(config.readOnly ?? false),
        FRESHDESK_DISABLE_DESTRUCTIVE: String(config.disableDestructive ?? false)
      }
    })
  exampleConfig:
    freshdeskApiKey: YOUR_FAKE_FRESHDESK_API_KEY
    freshdeskDomain: yourcompany.freshdesk.com
    readOnly: false
    disableDestructive: false
